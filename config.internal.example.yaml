# Example INTERNAL deployment config: the download.pytorch.org/whl/<channel>
# indexes are mirrored behind an corporate proxy. Copy this to
# config.internal.yaml (gitignored) and adjust, then generate with:
#
#     uv run python generate.py --config config.internal.yaml
#
# In "internal" mode only the channels listed under `index_overrides` are
# available in the picker; selecting any other compute platform shows
# `missing_index_message` instead of an install command.

mode: internal

# In "internal" mode this is unused (channels are never auto-derived); left here
# only for reference.
default_index_base: "https://download.pytorch.org/whl/"

# https://download.pytorch.org/whl/<channel>
#   -> https://artifacts.int.example.com/artifacts/api/pypi/pytorch-whl-<channel>-remote/simple/
index_overrides:
  cu126: "https://artifacts.int.example.com/artifacts/api/pypi/pytorch-whl-cu126-remote/simple/"
  cpu: "https://artifacts.int.example.com/artifacts/api/pypi/pytorch-whl-cpu-remote/simple/"
  rocm7.2: "https://artifacts.int.example.com/artifacts/api/pypi/pytorch-whl-rocm7.2-remote/simple/"

# Shown when a selected compute platform has no mirrored index. This may contain
# HTML (links render), and the tokens {channel} / <channel> are replaced with the
# selected channel (e.g. cu126, cpu, rocm7.2).
#
# The first link opens a PRE-FILLED Jira "create issue" ticket. Replace
# YOUR_PROJECT_ID / YOUR_ISSUETYPE_ID with the numeric ids for your project (read
# them off your Jira "Create" screen URL, or by cloning an existing ticket).
# Optionally add &components=<id> and &assignee=<user>. Keep the {channel} tokens
# so they get substituted per selection; the summary/description are URL-encoded.
missing_index_message: 'This wheel index (<code>pytorch-whl-{channel}-remote</code>) has not been mirrored yet. <a href="https://jira.int.example.com/secure/CreateIssueDetails!init.jspa?pid=YOUR_PROJECT_ID&amp;issuetype=YOUR_ISSUETYPE_ID&amp;summary=Mirror%20PyTorch%20wheel%20index%20pytorch-whl-{channel}-remote&amp;description=Please%20mirror%20https%3A%2F%2Fdownload.pytorch.org%2Fwhl%2F{channel}%20as%20the%20pytorch-whl-{channel}-remote%20repository.&amp;labels=pytorch-wheel-mirror">Open a pre-filled request ticket</a>, or clone <a href="https://jira.int.example.com/browse/PYTHON-1234">PYTHON-1234</a> and ping <a href="https://example.slack.com/archives/C00000000">#python-support</a> to have <code>pytorch-whl-{channel}-remote</code> created.'

# Point the header at the internal mirror of the repo, if any.
repo_url: "https://git.int.int.example.com/racinmat/pytorch-compatibility"
