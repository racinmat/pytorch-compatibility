# Example INTERNAL deployment config: the download.pytorch.org/whl/<channel>
# indexes are mirrored behind an corporate proxy. Copy this to
# config.internal.yaml (gitignored) and adjust, then generate with:
#
#     uv run python generate.py --config config.internal.yaml
#
# In "internal" mode only the channels listed under `index_overrides` are
# available in the picker; selecting any other compute platform shows
# `missing_index_message` instead of an install command.

mode: internal

# In "internal" mode this is unused (channels are never auto-derived); left here
# only for reference.
default_index_base: "https://download.pytorch.org/whl/"

# https://download.pytorch.org/whl/<channel>
#   -> https://artifacts.int.example.com/artifacts/api/pypi/pytorch-whl-<channel>-remote/simple/
index_overrides:
  cu126: "https://artifacts.int.example.com/artifacts/api/pypi/pytorch-whl-cu126-remote/simple/"
  cpu: "https://artifacts.int.example.com/artifacts/api/pypi/pytorch-whl-cpu-remote/simple/"
  rocm7.2: "https://artifacts.int.example.com/artifacts/api/pypi/pytorch-whl-rocm7.2-remote/simple/"

missing_index_message: >-
  This wheel index has not been mirrored to artifacts yet. Please request it in
  #python-support and clone ticket PYTHON-1234 to have the pytorch-whl-<channel>-remote
  repository created.

# Point the header at the internal mirror of the repo, if any.
repo_url: "https://git.int.avast.com/racinmat/pytorch-compatibility"
